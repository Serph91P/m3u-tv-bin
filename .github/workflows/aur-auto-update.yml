name: m3u-tv-bin aur auto update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'AUR package name to update'
        required: false
        default: 'm3u-tv-bin'
      release_api_url:
        description: 'GitHub API URL for latest upstream release JSON'
        required: false
        default: 'https://api.github.com/repos/m3ue/m3u-tv/releases/latest'
      asset_regex:
        description: 'Regex to select the Linux archive asset and extract version'
        required: false
        default: 'm3u-tv-v(?P<version>[0-9]+\.[0-9]+\.[0-9]+)-linux\.tar\.gz$'
      run_build:
        description: 'Run makepkg build and namcap checks'
        required: false
        default: true
        type: boolean
      push:
        description: 'Push PKGBUILD and .SRCINFO to AUR via SSH'
        required: false
        default: true
        type: boolean
      force_publish:
        description: 'Publish to AUR even when upstream metadata did not change'
        required: false
        default: false
        type: boolean

jobs:
  aur_update:
    name: Update and publish AUR package
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      contents: write

    steps:
      - name: Install toolchain
        run: |
          pacman -Syu --noconfirm --needed --quiet
          pacman -S --noconfirm --needed --quiet \
            base-devel \
            desktop-file-utils \
            git \
            gtk3 \
            hicolor-icon-theme \
            jre-openjdk-headless \
            libepoxy \
            libsecret \
            mpv \
            namcap \
            openssh \
            python
          useradd -m -s /bin/bash aurbuild

      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare workspace permissions
        run: |
          chown -R aurbuild:aurbuild "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run unit tests
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 -m unittest discover -s tests -v

      - name: Resolve workflow inputs
        id: resolve
        run: |
          PACKAGE_NAME="${{ github.event.inputs.package_name }}"
          if [ -z "$PACKAGE_NAME" ]; then
            PACKAGE_NAME="${{ vars.AUR_PACKAGE_NAME }}"
          fi
          if [ -z "$PACKAGE_NAME" ]; then
            PACKAGE_NAME="m3u-tv-bin"
          fi

          RELEASE_API_URL="${{ github.event.inputs.release_api_url }}"
          if [ -z "$RELEASE_API_URL" ]; then
            RELEASE_API_URL="${{ vars.UPSTREAM_RELEASE_API_URL }}"
          fi
          if [ -z "$RELEASE_API_URL" ]; then
            RELEASE_API_URL="https://api.github.com/repos/m3ue/m3u-tv/releases/latest"
          fi

          ASSET_REGEX="${{ github.event.inputs.asset_regex }}"
          if [ -z "$ASSET_REGEX" ]; then
            ASSET_REGEX="${{ vars.UPSTREAM_ASSET_REGEX }}"
          fi
          if [ -z "$ASSET_REGEX" ]; then
            ASSET_REGEX="m3u-tv-v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)-linux\\.tar\\.gz$"
          fi

          BUILD="${{ github.event.inputs.run_build }}"
          if [ -z "$BUILD" ]; then
            BUILD="true"
          fi

          PUSH="${{ github.event.inputs.push }}"
          if [ -z "$PUSH" ]; then
            PUSH="true"
          fi

          FORCE_PUBLISH="${{ github.event.inputs.force_publish }}"
          if [ -z "$FORCE_PUBLISH" ]; then
            FORCE_PUBLISH="false"
          fi

          echo "AUR_PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "UPSTREAM_RELEASE_API_URL=$RELEASE_API_URL" >> "$GITHUB_ENV"
          echo "UPSTREAM_ASSET_REGEX=$ASSET_REGEX" >> "$GITHUB_ENV"
          echo "RUN_BUILD=$BUILD" >> "$GITHUB_ENV"
          echo "PUSH_TO_AUR=$PUSH" >> "$GITHUB_ENV"
          echo "FORCE_PUBLISH=$FORCE_PUBLISH" >> "$GITHUB_ENV"

      - name: Run update script as unprivileged user
        id: update
        run: |
          runuser -u aurbuild --preserve-environment -- bash -lc '
            cd "$GITHUB_WORKSPACE"
            python3 scripts/aur_update.py \
              --json \
              --package-name "$AUR_PACKAGE_NAME" \
              --release-api-url "$UPSTREAM_RELEASE_API_URL" \
              --asset-regex "$UPSTREAM_ASSET_REGEX" > /tmp/aur-update.json
          '
          cat /tmp/aur-update.json

      - name: Parse update result
        id: result
        run: |
          CHANGED=$(python3 -c "import json; payload=json.load(open('/tmp/aur-update.json', 'r', encoding='utf-8')); print('true' if payload.get('changed') else 'false')")
          VERSION=$(python3 -c "import json; payload=json.load(open('/tmp/aur-update.json', 'r', encoding='utf-8')); print(payload.get('new_pkgver'))")
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and run checks as unprivileged user
        if: ${{ (steps.result.outputs.changed == 'true' || env.FORCE_PUBLISH == 'true') && env.RUN_BUILD == 'true' }}
        run: |
          runuser -u aurbuild --preserve-environment -- bash -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/packages/$AUR_PACKAGE_NAME"
            bash -n PKGBUILD
            namcap PKGBUILD || true
            makepkg -s --noconfirm --needed --check
            shopt -s nullglob
            packages=(./*.pkg.tar.*)
            if [ ${#packages[@]} -eq 0 ]; then
              echo "No package artifact was built."
              exit 1
            fi
            namcap "${packages[@]}" || true
          '

      - name: Commit package update back to GitHub
        if: steps.result.outputs.changed == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.email "actions@github.com"
          git config user.name "AUR Update Bot"
          git add "packages/$AUR_PACKAGE_NAME/PKGBUILD" "packages/$AUR_PACKAGE_NAME/.SRCINFO"
          if git diff --cached --quiet; then
            echo "No GitHub changes to commit."
            exit 0
          fi
          git commit -m "$AUR_PACKAGE_NAME: update to ${{ steps.result.outputs.version }}"
          git push

      - name: Push update to AUR
        if: ${{ (steps.result.outputs.changed == 'true' || env.FORCE_PUBLISH == 'true') && env.PUSH_TO_AUR == 'true' }}
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          AUR_SSH_KNOWN_HOSTS: ${{ secrets.AUR_SSH_KNOWN_HOSTS }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "Missing AUR_SSH_KEY secret. Skipping AUR push."
            exit 0
          fi
          if [ -z "$AUR_SSH_KNOWN_HOSTS" ]; then
            echo "Missing AUR_SSH_KNOWN_HOSTS secret. Refusing insecure AUR push."
            exit 1
          fi
          cd "$GITHUB_WORKSPACE"
          python3 scripts/publish_aur.py \
            --package-name "$AUR_PACKAGE_NAME" \
            --package-ver "${{ steps.result.outputs.version }}"
